<div class="add-vendor-wrapper">
  <div class="vendor-form-container">
    <h1 class="page-title">{{ isEditMode ? 'Edit Vendor' : 'Add New Vendor' }}</h1>
    
    <form [formGroup]="vendorForm" (ngSubmit)="onSubmit()" class="vendor-form">
      <div class="form-grid">
        <!-- Basic Information Section -->
        <div class="form-column">
          <h3 class="section-title">
            <span class="icon">📋</span>
            Basic Information
          </h3>

          <div class="form-group">
            <label for="vendorName">Vendor Name <span class="required">*</span></label>
            <input 
              id="vendorName"
              type="text" 
              formControlName="vendorName" 
              placeholder="e.g., ABC Technologies"
              class="form-input"
              [class.error]="f['vendorName'].invalid && f['vendorName'].touched">
            <div class="error-message" *ngIf="f['vendorName'].hasError('required') && f['vendorName'].touched">
              Vendor name is required
            </div>
            <div class="error-message" *ngIf="f['vendorName'].hasError('maxlength') && f['vendorName'].touched">
              Vendor name is too long
            </div>
          </div>

          <div class="form-group">
            <label for="contactPerson">Contact Person</label>
            <input 
              id="contactPerson"
              type="text" 
              formControlName="contactPerson" 
              placeholder="e.g., John Doe"
              class="form-input"
              [class.error]="f['contactPerson'].invalid && f['contactPerson'].touched">
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input 
              id="email"
              type="email" 
              formControlName="email" 
              placeholder="e.g., contact@abctech.com"
              class="form-input"
              [class.error]="f['email'].invalid && f['email'].touched">
            <div class="error-message" *ngIf="f['email'].hasError('email') && f['email'].touched">
              Please enter a valid email address
            </div>
          </div>

          <div class="form-group">
            <label for="phoneNumber">Phone Number</label>
            <input 
              id="phoneNumber"
              type="tel" 
              formControlName="phoneNumber" 
              placeholder="e.g., +1 234-567-8900"
              class="form-input"
              [class.error]="f['phoneNumber'].invalid && f['phoneNumber'].touched">
          </div>

          <div class="form-group">
            <label for="isActive">Status</label>
            <div class="checkbox-group">
              <input 
                id="isActive"
                type="checkbox" 
                formControlName="isActive"
                class="checkbox-input">
              <label for="isActive" class="checkbox-label">Active</label>
            </div>
          </div>
        </div>

        <!-- Address Information Section -->
        <div class="form-column">
          <h3 class="section-title">
            <span class="icon">📍</span>
            Address Information
          </h3>

          <div class="form-group">
            <label for="address">Address</label>
            <textarea 
              id="address"
              formControlName="address" 
              rows="3" 
              placeholder="Street address"
              class="form-input"
              [class.error]="f['address'].invalid && f['address'].touched"></textarea>
          </div>

          <div class="form-group">
            <label for="city">City</label>
            <input 
              id="city"
              type="text" 
              formControlName="city" 
              placeholder="e.g., New York"
              class="form-input"
              [class.error]="f['city'].invalid && f['city'].touched">
          </div>

          <div class="form-group">
            <label for="state">State</label>
            <input 
              id="state"
              type="text" 
              formControlName="state" 
              placeholder="e.g., NY"
              class="form-input"
              [class.error]="f['state'].invalid && f['state'].touched">
          </div>

          <div class="form-group">
            <label for="country">Country</label>
            <input 
              id="country"
              type="text" 
              formControlName="country" 
              placeholder="e.g., USA"
              class="form-input"
              [class.error]="f['country'].invalid && f['country'].touched">
          </div>
        </div>
      </div>

      <!-- Tax Information Section -->
      <div class="form-section-full">
        <h3 class="section-title">
          <span class="icon">💼</span>
          Tax Information
        </h3>
        
        <div class="form-grid-2">
          <div class="form-group">
            <label for="gstNumber">GST Number</label>
            <input 
              id="gstNumber"
              type="text" 
              formControlName="gstNumber" 
              placeholder="e.g., GST123456"
              class="form-input"
              [class.error]="f['gstNumber'].invalid && f['gstNumber'].touched">
          </div>

          <div class="form-group">
            <label for="taxID">Tax ID</label>
            <input 
              id="taxID"
              type="text" 
              formControlName="taxID" 
              placeholder="e.g., TAX-123456"
              class="form-input"
              [class.error]="f['taxID'].invalid && f['taxID'].touched">
          </div>
        </div>
      </div>

      <!-- Loading State -->
      <div *ngIf="loading" class="loading-overlay">
        <div class="spinner"></div>
        <p>{{ isEditMode ? 'Updating vendor...' : 'Adding vendor...' }}</p>
      </div>

      <!-- Form Actions -->
      <div class="form-actions">
        <button type="button" class="btn btn-secondary" (click)="onCancel()" [disabled]="loading">
          Cancel
        </button>
        <button type="submit" class="btn btn-primary" [disabled]="loading || vendorForm.invalid">
          <span *ngIf="loading" class="spinner"></span>
          {{ loading ? (isEditMode ? 'Updating...' : 'Adding...') : (isEditMode ? 'Update Vendor' : 'Add Vendor') }}
        </button>
      </div>
    </form>
  </div>
</div>
