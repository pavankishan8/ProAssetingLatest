<div class="settings-container">
  <div class="settings-header">
    <h1>Company Settings</h1>
    <p>Manage your company information, logo, and system configurations</p>
  </div>

  <div *ngIf="loading && !settings" class="loading-container">
    <div class="spinner"></div>
    <p>Loading settings...</p>
  </div>

  <div *ngIf="settings" class="settings-content">
    <!-- Company Logo Section -->
    <div class="settings-section">
      <div class="section-header">
        <h2>Company Logo</h2>
      </div>
      <div class="section-content">
        <div class="logo-section">
          <div class="logo-preview-container">
            <div class="logo-preview">
              <img 
                *ngIf="getLogoUrl()" 
                [src]="getLogoUrl()" 
                alt="Company Logo"
                class="logo-image"
                onerror="this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAwIiBoZWlnaHQ9IjIwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMjAwIiBoZWlnaHQ9IjIwMCIgZmlsbD0iI2UwZTBlMCIvPjx0ZXh0IHg9IjUwJSIgeT0iNTAlIiBmb250LWZhbWlseT0iQXJpYWwiIGZvbnQtc2l6ZT0iMTQiIGZpbGw9IiM5OTkiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGR5PSIuM2VtIj5ObyBMb2dvPC90ZXh0Pjwvc3ZnPg=='">
              <div *ngIf="!getLogoUrl()" class="logo-placeholder">
                <span class="icon">🖼️</span>
                <span>No logo uploaded</span>
              </div>
            </div>
          </div>
          <div class="upload-section">
            <input 
              type="file" 
              id="logoFile"
              accept="image/jpeg,image/jpg,image/png,image/gif,image/bmp"
              (change)="onFileSelected($event)"
              class="file-input">
            <label for="logoFile" class="file-label">
              <span class="icon">📁</span>
              <span>{{ selectedFile ? selectedFile.name : 'Choose Logo File' }}</span>
              <span class="file-hint">JPG, PNG, GIF, BMP (Max 5MB)</span>
            </label>
            <button 
              type="button"
              class="btn btn-primary"
              (click)="uploadLogo()"
              [disabled]="!selectedFile || uploadingLogo">
              <span *ngIf="!uploadingLogo">📤</span>
              <span *ngIf="uploadingLogo" class="spinner-small"></span>
              {{ uploadingLogo ? 'Uploading...' : 'Upload Logo' }}
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Company Information Section -->
    <div class="settings-section">
      <div class="section-header">
        <h2>Company Information</h2>
      </div>
      <div class="section-content">
        <div class="form-grid">
          <div class="form-group">
            <label for="companyName">Company Name *</label>
            <input 
              type="text" 
              id="companyName"
              class="form-input"
              [(ngModel)]="formData.companyName"
              placeholder="Enter company name">
          </div>

          <div class="form-group">
            <label for="industry">Industry</label>
            <input 
              type="text" 
              id="industry"
              class="form-input"
              [(ngModel)]="formData.industry"
              placeholder="Enter industry">
          </div>

          <div class="form-group full-width">
            <label for="address">Address</label>
            <textarea 
              id="address"
              class="form-input"
              rows="3"
              [(ngModel)]="formData.address"
              placeholder="Enter company address"></textarea>
          </div>

          <div class="form-group">
            <label for="phoneNumber">Phone Number</label>
            <input 
              type="tel" 
              id="phoneNumber"
              class="form-input"
              [(ngModel)]="formData.phoneNumber"
              placeholder="Enter phone number">
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input 
              type="email" 
              id="email"
              class="form-input"
              [(ngModel)]="formData.email"
              placeholder="Enter email address">
          </div>

          <div class="form-group">
            <label for="website">Website</label>
            <input 
              type="url" 
              id="website"
              class="form-input"
              [(ngModel)]="formData.website"
              placeholder="https://example.com">
          </div>

          <div class="form-group">
            <label for="gstNumber">GST Number</label>
            <input 
              type="text" 
              id="gstNumber"
              class="form-input"
              [(ngModel)]="formData.gstNumber"
              placeholder="Enter GST number">
          </div>

          <div class="form-group">
            <label for="spocInformation">SPOC Information</label>
            <input 
              type="text" 
              id="spocInformation"
              class="form-input"
              [(ngModel)]="formData.spocInformation"
              placeholder="Single Point of Contact">
          </div>
        </div>
      </div>
    </div>

    <!-- System Configuration Section -->
    <div class="settings-section">
      <div class="section-header">
        <h2>System Configuration</h2>
      </div>
      <div class="section-content">
        <div class="form-grid">
          <div class="form-group">
            <label for="currency">Currency</label>
            <select id="currency" class="form-input" [(ngModel)]="formData.currency">
              <option value="USD">USD - US Dollar</option>
              <option value="INR">INR - Indian Rupee</option>
              <option value="EUR">EUR - Euro</option>
              <option value="GBP">GBP - British Pound</option>
            </select>
          </div>

          <div class="form-group">
            <label for="timeZone">Time Zone</label>
            <input 
              type="text" 
              id="timeZone"
              class="form-input"
              [(ngModel)]="formData.timeZone"
              placeholder="UTC">
          </div>

          <div class="form-group">
            <label for="dateFormat">Date Format</label>
            <select id="dateFormat" class="form-input" [(ngModel)]="formData.dateFormat">
              <option value="MM/dd/yyyy">MM/DD/YYYY</option>
              <option value="dd/MM/yyyy">DD/MM/YYYY</option>
              <option value="yyyy-MM-dd">YYYY-MM-DD</option>
              <option value="dd-MM-yyyy">DD-MM-YYYY</option>
            </select>
          </div>

          <div class="form-group">
            <label for="timeFormat">Time Format</label>
            <select id="timeFormat" class="form-input" [(ngModel)]="formData.timeFormat">
              <option value="12h">12 Hour</option>
              <option value="24h">24 Hour</option>
            </select>
          </div>

          <div class="form-group">
            <label for="defaultPageSize">Default Page Size</label>
            <input 
              type="number" 
              id="defaultPageSize"
              class="form-input"
              [(ngModel)]="formData.defaultPageSize"
              min="5"
              max="100"
              placeholder="10">
          </div>
        </div>
      </div>
    </div>

    <!-- Notification Settings Section -->
    <div class="settings-section">
      <div class="section-header">
        <h2>Notification Settings</h2>
      </div>
      <div class="section-content">
        <div class="checkbox-group">
          <label class="checkbox-label">
            <input 
              type="checkbox"
              [(ngModel)]="formData.enableEmailNotifications">
            <span>Enable Email Notifications</span>
          </label>
          <label class="checkbox-label">
            <input 
              type="checkbox"
              [(ngModel)]="formData.enableSMSNotifications">
            <span>Enable SMS Notifications</span>
          </label>
        </div>
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="settings-actions">
      <button 
        type="button"
        class="btn btn-secondary"
        (click)="loadSettings()">
        Reset
      </button>
      <button 
        type="button"
        class="btn btn-primary"
        (click)="saveSettings()"
        [disabled]="loading">
        <span *ngIf="loading" class="spinner-small"></span>
        {{ loading ? 'Saving...' : 'Save Settings' }}
      </button>
    </div>
  </div>
</div>
