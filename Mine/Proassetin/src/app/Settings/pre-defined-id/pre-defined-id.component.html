<div class="predefined-id-container">
    <div class="config-grid">
        <!-- Pre-Defined AssetID Section -->
        <div class="config-card">
            <div class="card-header">
                <div class="header-content">
                    <i class="fas fa-id-card"></i>
                    <h2>Pre-Defined AssetID</h2>
                </div>
                <button class="refresh-btn" (click)="refreshComponent()" title="Refresh">
                    <i class="fas fa-sync-alt"></i>
                </button>
            </div>
            <div class="card-body">
                <div class="form-group">
                    <label class="form-label" for="predefinedAssetID">
                        <i class="fas fa-tag"></i>
                        Asset ID Prefix
                    </label>
                    <input type="text" 
                           class="form-input" 
                           id="predefinedAssetID"
                           [(ngModel)]="predefinedAssetID" 
                           [placeholder]="predefinedAssetID || 'Enter 3 capital letters (e.g., ABC)'"
                           maxlength="3"
                           pattern="[A-Z]{3}"
                           title="Enter exactly 3 capital letters">
                    <span class="input-hint">Must be exactly 3 capital letters</span>
                </div>
                <div class="card-actions">
                    <button class="save-btn" (click)="saveConfiguration()" [disabled]="loading">
                        <i class="fas fa-save" *ngIf="!loading"></i>
                        <i class="fas fa-spinner fa-spin" *ngIf="loading"></i>
                        <span>{{ loading ? 'Saving...' : 'Save Changes' }}</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Company Logo Section -->
        <div class="config-card">
            <div class="card-header">
                <div class="header-content">
                    <i class="fas fa-image"></i>
                    <h2>Company Logo</h2>
                </div>
                <button class="refresh-btn" (click)="refreshImage()" title="Refresh">
                    <i class="fas fa-sync-alt"></i>
                </button>
            </div>
            <div class="card-body">
                <div class="logo-preview-section">
                    <div class="logo-preview">
                        <img id="employeeImage" 
                             class="logo-image" 
                             alt="Company Logo"
                             *ngIf="imageData"
                             [src]="imageData">
                        <div class="logo-placeholder" *ngIf="!imageData">
                            <i class="fas fa-image"></i>
                            <span>No logo uploaded</span>
                        </div>
                    </div>
                </div>
                <div class="upload-section">
                    <input type="file" 
                           class="file-input" 
                           id="logoFile"
                           (change)="onFileSelected($event)" 
                           name="image" 
                           accept=".jpeg, .jpg, .png">
                    <label for="logoFile" class="file-label">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <span>{{ selectedFile ? selectedFile.name : 'Choose Logo File' }}</span>
                        <span class="file-hint">JPEG, JPG, PNG only</span>
                    </label>
                    <button class="upload-btn" 
                            (click)="uploadImage()" 
                            [disabled]="!selectedFile || loading">
                        <i class="fas fa-upload" *ngIf="!loading"></i>
                        <i class="fas fa-spinner fa-spin" *ngIf="loading"></i>
                        <span>{{ loading ? 'Uploading...' : 'Upload Logo' }}</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- GST Number Section -->
        <div class="config-card">
            <div class="card-header">
                <div class="header-content">
                    <i class="fas fa-receipt"></i>
                    <h2>GST Number</h2>
                </div>
                <button class="refresh-btn" (click)="refreshGST()" title="Refresh">
                    <i class="fas fa-sync-alt"></i>
                </button>
            </div>
            <div class="card-body">
                <div class="form-group">
                    <label class="form-label" for="gstNumber">
                        <i class="fas fa-hashtag"></i>
                        GST Number
                    </label>
                    <input type="text" 
                           class="form-input" 
                           id="gstNumber"
                           [(ngModel)]="gstNumber"
                           placeholder="Enter GST number (e.g., 8598ZA47SPAG45X)">
                    <span class="input-hint">Enter your company's GST registration number</span>
                </div>
                <div class="card-actions">
                    <button class="save-btn" (click)="saveGST()" [disabled]="loading">
                        <i class="fas fa-save" *ngIf="!loading"></i>
                        <i class="fas fa-spinner fa-spin" *ngIf="loading"></i>
                        <span>{{ loading ? 'Saving...' : 'Save Changes' }}</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
