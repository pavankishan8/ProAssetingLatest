<div class="smtp-config-container">
    <h1 class="page-title">SMTP Configurations</h1>
    
    <div class="config-card">
        <div class="form-section">
            <div class="form-grid">
                <div class="form-group">
                    <label class="form-label" for="SEmail">
                        <i class="fas fa-envelope"></i>
                        Sender Email
                    </label>
                    <input type="email" 
                           class="form-input" 
                           id="SEmail" 
                           placeholder="Enter sender email address"
                           required>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="Host">
                        <i class="fas fa-server"></i>
                        Host
                    </label>
                    <input type="text" 
                           class="form-input" 
                           id="Host" 
                           placeholder="e.g., smtp.gmail.com"
                           required>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="Username">
                        <i class="fas fa-user"></i>
                        Username
                    </label>
                    <input type="text" 
                           class="form-input" 
                           id="Username" 
                           placeholder="Enter SMTP username"
                           required>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="Password">
                        <i class="fas fa-lock"></i>
                        Password
                    </label>
                    <input type="password" 
                           class="form-input" 
                           id="Password" 
                           placeholder="Leave blank to keep unchanged"
                           required>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="Port">
                        <i class="fas fa-network-wired"></i>
                        Port
                    </label>
                    <input type="text" 
                           class="form-input" 
                           id="Port" 
                           placeholder="e.g., 587, 465, 25"
                           required>
                </div>
            </div>
        </div>
        
        <div class="options-section">
            <h3 class="options-title">Connection Options</h3>
            <div class="checkbox-group">
                <div class="checkbox-item">
                    <mat-checkbox class="modern-checkbox" [(ngModel)]="enableTLS">
                        <span class="checkbox-label">
                            <i class="fas fa-shield-alt"></i>
                            Enable TLS/SSL
                        </span>
                    </mat-checkbox>
                    <span class="checkbox-hint">Use secure connection (recommended)</span>
                </div>
                
                <div class="checkbox-item">
                    <mat-checkbox class="modern-checkbox" [(ngModel)]="enableAuth">
                        <span class="checkbox-label">
                            <i class="fas fa-key"></i>
                            Enable Authentication
                        </span>
                    </mat-checkbox>
                    <span class="checkbox-hint">Require username and password</span>
                </div>
            </div>
        </div>
        
        <div class="actions-section">
            <button class="save-btn" (click)="saveConfig()">
                <i class="fas fa-save"></i>
                <span>Save Changes</span>
            </button>
            <button class="test-btn" (click)="testConnection()">
                <i class="fas fa-vial"></i>
                <span>Test Connection</span>
            </button>
        </div>
    </div>
</div>
