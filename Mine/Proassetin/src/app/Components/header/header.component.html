<mat-toolbar color="primary">
    <mat-toolbar-row style="width: 100%; display: flex; justify-content: space-between; align-items: center;">
      <span>
        <img src="\assets\Images\assets.png" class="proassetin-logo"> Proassetin
      </span>
      
      <div style="display: flex; align-items: center;">
        <div>
          <li style="margin-bottom: 0; list-style-type: none;">{{ fullName }}</li>
          <li style="display: block; font-size: 12px; color: white; margin-left: 1px !important;
          margin: -15%;">{{ userRole }}</li>
        </div>
        
        <button mat-icon-button [matMenuTriggerFor]="menu">
          <i class="fa-solid fa-circle-user" style="font-size: 100%;"></i>
        </button>
        
        <mat-menu #menu="matMenu">
          <button mat-menu-item routerLink="/UserSettings">
            <mat-icon>account_circle</mat-icon>
            <span>Account Settings</span>
          </button>
          <button mat-menu-item>
            <mat-icon>settings</mat-icon>
            <span>Settings</span>
          </button>
          <button mat-menu-item (click)="logout()">
            <mat-icon>exit_to_app</mat-icon>
            <span>Log Out</span>
          </button>
        </mat-menu>
      </div>
    </mat-toolbar-row>
  </mat-toolbar>
